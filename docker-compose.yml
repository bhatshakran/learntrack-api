services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: learntrack
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
  app:
    build: .
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgres://user:password@db:5432/learntrack
    depends_on: [db]
